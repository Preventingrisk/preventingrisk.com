<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Interactive Digital Clock</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #121212;\n            color: #ffffff;\n            font-family: Arial, sans-serif;\n        }\n        .clock {\n            display: grid;\n            grid-template-columns: repeat(3, 150px);\n            gap: 20px;\n        }\n        .clock > div {\n            background: #1e1e1e;\n            padding: 20px;\n            border-radius: 5px;\n            box-shadow: 0 0 10px rgba(0,0,0,0.5);\n            text-align: center;\n        }\n        .time {\n            font-size: 24px;\n        }\n        .timezone {\n            font-size: 18px;\n        }\n    </style>\n</head>\n<body>\n    <div class="clock">\n        <div><div class="timezone">UTC</div><div class="time" id="utc"></div></div>\n        <div><div class="timezone">EST</div><div class="time" id="est"></div></div>\n        <div><div class="timezone">PST</div><div class="time" id="pst"></div></div>\n        <div><div class="timezone">GMT</div><div class="time" id="gmt"></div></div>\n        <div><div class="timezone">IST</div><div class="time" id="ist"></div></div>\n        <div><div class="timezone">JST</div><div class="time" id="jst"></div></div>\n    </div>\n    <script>\n        function updateClocks() {\n            const utcDate = new Date();\n            const utcString = utcDate.toUTCString().split(' ')[4];\n            document.getElementById('utc').textContent = utcString;\n            document.getElementById('est').textContent = new Date(utcDate.setHours(utcDate.getHours() - 5)).toLocaleTimeString();\n            document.getElementById('pst').textContent = new Date(utcDate.setHours(utcDate.getHours() - 3)).toLocaleTimeString();\n            document.getElementById('gmt').textContent = new Date(utcDate.setHours(utcDate.getHours() + 0)).toLocaleTimeString();\n            document.getElementById('ist').textContent = new Date(utcDate.setHours(utcDate.getHours() + 5, 30)).toLocaleTimeString();\n            document.getElementById('jst').textContent = new Date(utcDate.setHours(utcDate.getHours() + 9)).toLocaleTimeString();\n        }\n        setInterval(updateClocks, 1000);\n        updateClocks();\n    </script>\n</body>\n</html>
